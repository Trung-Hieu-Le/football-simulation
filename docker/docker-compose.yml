version: '3.9'

services:
  # MySQL 8.0
  mysql:
    env_file:
      - ../.env
    image: mysql:8.0
    container_name: football-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-football_simulation}
    ports:
      - "${MYSQL_PORT_HOST:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - football-network

  # PHP 8.1-FPM
  php:
    env_file:
      - ../.env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football-php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-football_simulation}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      LARAVEL_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
    volumes:
      - ../:/var/www/html
      - ../storage/logs:/var/www/html/storage/logs
    working_dir: /var/www/html
    networks:
      - football-network

  # Nginx
  nginx:
    env_file:
      - ../.env
    image: nginx:alpine
    container_name: football-nginx
    restart: unless-stopped
    depends_on:
      - php
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ../:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../storage/logs/nginx:/var/log/nginx
    networks:
      - football-network

volumes:
  mysql_data:
    driver: local

networks:
  football-network:
    name: football-network
    driver: bridge
